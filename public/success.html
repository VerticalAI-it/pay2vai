<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />

  <title>GEO – Pagamento Riuscito</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center font-sans px-6">

  <div class="bg-white rounded-2xl shadow-lg p-10 max-w-md w-full text-center">

    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>

    <h1 class="text-2xl font-extrabold text-gray-900 mb-3">Pagamento completato!</h1>

      Il tuo piano è ora <strong>attivo</strong>. Il team GEO ti contatterà entro 24 ore lavorative.
    </div>

    <a href="/" class="inline-block text-indigo-600 hover:text-indigo-800 text-sm font-medium transition">
      ← Torna alla home
    </a>
  </div>

  <p class="mt-8 text-xs text-gray-300">Gestito in sicurezza da Stripe &amp; GEO</p>
