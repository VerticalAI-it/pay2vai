<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VerticalAI Admin – Gestione Offerte</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-active   { border-bottom: 2px solid #6366f1; color: #6366f1; font-weight: 600; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #6b7280; }
    .badge-active   { background: #dcfce7; color: #166534; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }
    .badge-pending  { background: #fef9c3; color: #854d0e; }
    .badge-completed { background: #dcfce7; color: #166534; }
    .badge-failed   { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <!-- Login overlay -->
  <div id="login-overlay" class="fixed inset-0 bg-gray-900/80 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
      <h2 class="text-xl font-bold text-gray-800 mb-6 text-center">Accesso Amministratore</h2>
      <input
        id="token-input"
        type="password"
        placeholder="Admin token"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"
      />
      <div id="login-error" class="hidden text-red-500 text-sm mb-3">Token non valido</div>
      <button
        id="login-btn"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition"
      >
        Accedi
      </button>
    </div>
  </div>

  <!-- App shell (hidden until logged in) -->
  <div id="app" class="hidden">

    <header class="bg-white shadow-sm">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-2xl font-bold text-indigo-600">VerticalAI</span>
          <span class="text-gray-300">|</span>
          <span class="text-gray-600 font-medium">Admin</span>
        </div>
        <button id="logout-btn" class="text-sm text-gray-400 hover:text-red-500 transition">Esci</button>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">

      <!-- Tabs -->
      <div class="flex gap-6 border-b border-gray-200 mb-8">
        <button data-tab="offers" class="tab-active pb-3 px-1 text-sm transition" onclick="switchTab('offers')">Offerte</button>
        <button data-tab="orders" class="tab-inactive pb-3 px-1 text-sm transition" onclick="switchTab('orders')">Ordini</button>
      </div>

      <!-- ===== OFFERS TAB ===== -->
      <section id="tab-offers">

        <!-- Create form -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-8">
          <h2 class="text-lg font-bold text-gray-800 mb-5">Nuova Offerta</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">Codice</label>
              <input id="f-code" type="text" placeholder="OFFERTA50"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 font-mono uppercase text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">Prezzo (€)</label>
              <input id="f-amount" type="number" min="0" step="0.01" placeholder="490.00"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
            </div>
            <div class="sm:col-span-2">
              <label class="block text-xs font-semibold text-gray-500 mb-1">Descrizione</label>
              <input id="f-description" type="text" placeholder="Consulenza VerticalAI Premium"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">Ricorrenza</label>
              <select id="f-billing"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                <option value="recurring_monthly">Mensile (abbonamento)</option>
                <option value="one_time">Una tantum (pagamento unico)</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">Valuta</label>
              <select id="f-currency"
                class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                <option value="EUR">EUR (€)</option>
                <option value="USD">USD ($)</option>
                <option value="GBP">GBP (£)</option>
              </select>
            </div>
          </div>
          <div id="form-error" class="hidden text-red-500 text-sm mb-3"></div>
          <button id="create-btn"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-xl text-sm transition">
            Crea Offerta
          </button>
        </div>

        <!-- Offers table -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
            <h2 class="text-lg font-bold text-gray-800">Offerte Attive</h2>
            <button onclick="loadOffers()" class="text-xs text-indigo-500 hover:text-indigo-700">↻ Aggiorna</button>
          </div>
          <div id="offers-loading" class="p-8 text-center text-gray-400 text-sm">Caricamento…</div>
          <div id="offers-empty"  class="hidden p-8 text-center text-gray-400 text-sm">Nessuna offerta trovata.</div>
          <table id="offers-table" class="hidden w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-100">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Codice</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Descrizione</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Prezzo</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Ricorrenza</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Stato</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Azioni</th>
              </tr>
            </thead>
            <tbody id="offers-body" class="divide-y divide-gray-50"></tbody>
          </table>
        </div>
      </section>

      <!-- ===== ORDERS TAB ===== -->
      <section id="tab-orders" class="hidden">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
            <h2 class="text-lg font-bold text-gray-800">Ordini</h2>
            <button onclick="loadOrders()" class="text-xs text-indigo-500 hover:text-indigo-700">↻ Aggiorna</button>
          </div>
          <div id="orders-loading" class="p-8 text-center text-gray-400 text-sm">Caricamento…</div>
          <div id="orders-empty"  class="hidden p-8 text-center text-gray-400 text-sm">Nessun ordine trovato.</div>
          <table id="orders-table" class="hidden w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-100">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Data</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Email</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Codice</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Importo</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Tipo</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Stato</th>
              </tr>
            </thead>
            <tbody id="orders-body" class="divide-y divide-gray-50"></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
